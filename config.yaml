# 标书制作工具配置文件
# 注意：API Key 建议通过环境变量 TENDER_DEEPSEEK_API_KEY 传入

tender_tool:
  # 项目根目录（相对路径，基于 config.yaml 所在目录）
  projects_dir: ./projects

  # 材料库根目录
  materials_dir: ./materials

  # 导出输出目录
  exports_dir: ./exports

  # AI 配置
  ai:
    provider: deepseek  # 目前只支持 deepseek
    model: deepseek-v4-flash  # V4 主推（deepseek-chat 将在 2026/07/24 弃用）
    base_url: https://api.deepseek.com  # 可改为代理/中转地址
    api_key_env: TENDER_DEEPSEEK_API_KEY  # 环境变量名（写入 .env，已被 .gitignore 排除）

  # 解析配置（ParserAgent / bid_parser）
  parser:
    supported_formats:
      - pdf
      - docx
    key_info_count: 14  # K01-K14

    # 解析模式：auto（根据文件大小自动选择）/ quick（1次LLM，K01-K14）/ full（~10次LLM，完整schema）/ manual（仅PDF提取+标记扫描）
    mode: auto

    # PDF 引擎：pdfplumber（推荐，中文支持好）/ pymupdf（速度快）
    pdf_engine: pdfplumber

    # 标记扫描配置
    marker_scan:
      enabled: true
      extra_markers: []  # 用户自定义额外标记符号，如 ["[废标]", "[重要]"]

    # LLM 批量大小（标记抽取单批最大条目数）
    llm_batch_size: 50

  # 材料库分类（预定义）
  categories:
    - 01_公司资质
    - 02_业绩案例
    - 03_技术方案
    - 04_实施方案
    - 05_商务文件
    - 06_其他
